<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receitas de minas</title>
</head>
<body>
    <header>
        <h1>Delícias de Minas</h1>
    </header>
    
    <main>

        <section>
            <h2>Pão de queijo</h2>
            <img src="image/pao-de-queijo.webp" width="400px" alt="">
            <button popovertarget="segredo">Ver segredo do Chef</button>
            <div id="segredo" popover>
                <p>Jamais coloque os ovos com a massa quente, senão eles cozinham e o pão não cresce!</p>
            </div>

        </section>

        <section>
            <h3>INGREDIENTES</h3>
            <ul>
                <li>1 ovo inteiro</li>
                <li>1 colher (café) de sal</li>
                <li>1 xícara (chá) de leite</li>
                <li>1 xícara (chá) de polvinho azedo</li>
            </ul>
        </section>

    </main>
</body>
</html>
